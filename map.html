<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线地图 - MTN Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #000;
            color: #fff;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 52px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 22px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* Logo */
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-right: 40px;
            text-decoration: none;
        }

        .logo .mtn {
            color: #4C93FB;
        }

        .logo .server {
            color: #fff;
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            gap: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            border-radius: 6px;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            color: #4C93FB;
        }

        .nav-item.active {
            color: #4C93FB;
        }

        /* iframe 容器 */
        .iframe-container {
            position: fixed;
            top: 52px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <span class="mtn">MTN</span><span class="server"> Server</span>
        </a>
        <div class="nav-menu">
            <a class="nav-item" href="index.html">主页</a>
            <a class="nav-item" href="join.html">加入服务器</a>
            <a class="nav-item" href="wiki.html">WIKI</a>
            <a class="nav-item active" href="map.html">在线地图</a>
            <a class="nav-item" href="feedback.html">反馈问题</a>
            <a class="nav-item" href="contact.html">联系我们</a>
        </div>
    </nav>

    <!-- iframe 嵌套外部网站 -->
    <div class="iframe-container">
        <iframe src="https://map.mcmtn.net" title="在线地图"></iframe>
    </div>
</body>
</html>
