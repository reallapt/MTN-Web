<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - MTN Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 52px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 22px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* Logo */
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-right: 40px;
            text-decoration: none;
        }

        .logo .mtn {
            color: #4C93FB;
        }

        .logo .server {
            color: #fff;
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            gap: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            border-radius: 6px;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            color: #4C93FB;
        }

        .nav-item.active {
            color: #4C93FB;
        }

        /* 主内容 */
        .main-content {
            padding-top: 52px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            padding-left: 40px;
            padding-right: 40px;
        }

        /* 联系卡片 */
        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 60px;
            max-width: 600px;
        }

        .contact-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
        }

        .contact-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .contact-desc {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            margin-bottom: 10px;
        }

        .contact-qq {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        .contact-qq span {
            color: #4C93FB;
            font-weight: 600;
        }

        .copy-link {
            color: #4C93FB;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .copy-link:hover {
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-30px);
            background: rgba(0, 0, 0, 0.95);
            color: #4C93FB;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9999;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .qr-container img {
            width: 400px;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <span class="mtn">MTN</span><span class="server"> Server</span>
        </a>
        <div class="nav-menu">
            <a class="nav-item" href="index.html">主页</a>
            <a class="nav-item" href="join.html">加入服务器</a>
            <a class="nav-item" href="wiki.html">WIKI</a>
            <a class="nav-item" href="map.html">在线地图</a>
            <a class="nav-item" href="feedback.html">反馈问题</a>
            <a class="nav-item active" href="contact.html">联系我们</a>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="contact-card">
            <h1 class="contact-title">联系我们</h1>
            <p class="contact-subtitle">加入 MTN 官方 QQ 群，获取最新资讯与技术支持</p>
            <p class="contact-desc">扫码加入QQ群</p>
            <p class="contact-qq">群号：<span>1064494318</span></p>
            <p class="copy-link" onclick="copyLink()">点击复制</p>
        </div>
        <div class="qr-container">
            <img src="assets/qq-group.png" alt="QQ群二维码">
        </div>
    </main>

    <div class="toast" id="toast">复制成功！</div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText('https://qm.qq.com/q/WET2wywHyW').then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            });
        }
    </script>
</body>
</html>
