<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTN Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #000;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
        }

        /* 导航栏容器 */
        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 52px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 22px;
            position: relative;
            z-index: 2;
        }

        /* Logo */
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-right: 40px;
        }

        .logo .mtn {
            color: #4C93FB;
        }

        .logo .server {
            color: #fff;
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            gap: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            border-radius: 6px;
            transition: color 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .nav-item:hover {
            color: #4C93FB;
        }

        .nav-item.active {
            color: #4C93FB;
        }

        /* 展开面板 */
        .dropdown-wrapper {
            position: absolute;
            top: 52px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.32, 0.72, 0, 1),
                        opacity 0.3s ease;
            opacity: 0;
        }

        .dropdown-wrapper.open {
            max-height: 300px;
            opacity: 1;
        }

        .dropdown-content {
            padding: 30px 0;
            max-width: 980px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        .dropdown-column {
            text-align: center;
            min-width: 180px;
        }

        .dropdown-column h3 {
            color: #4C93FB;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .dropdown-wrapper.open .dropdown-column h3 {
            opacity: 1;
            transform: translateY(0);
        }

        .dropdown-column ul {
            list-style: none;
        }

        .dropdown-column li {
            padding: 6px 0;
        }

        .dropdown-column a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            opacity: 0;
            transform: translateY(12px);
            display: inline-block;
        }

        .dropdown-wrapper.open .dropdown-column a {
            opacity: 1;
            transform: translateY(0);
        }

        .dropdown-column a:hover {
            color: #fff;
        }

        /* 渐入动画延迟 - 按列和行依次出现，更慢更明显 */
        .dropdown-column:nth-child(1) h3 { transition-delay: 0.1s; }
        .dropdown-column:nth-child(2) h3 { transition-delay: 0.2s; }
        .dropdown-column:nth-child(3) h3 { transition-delay: 0.3s; }

        .dropdown-column:nth-child(1) li:nth-child(1) a { transition-delay: 0.2s; }
        .dropdown-column:nth-child(1) li:nth-child(2) a { transition-delay: 0.25s; }
        .dropdown-column:nth-child(1) li:nth-child(3) a { transition-delay: 0.3s; }
        .dropdown-column:nth-child(1) li:nth-child(4) a { transition-delay: 0.35s; }

        .dropdown-column:nth-child(2) li:nth-child(1) a { transition-delay: 0.3s; }
        .dropdown-column:nth-child(2) li:nth-child(2) a { transition-delay: 0.35s; }
        .dropdown-column:nth-child(2) li:nth-child(3) a { transition-delay: 0.4s; }
        .dropdown-column:nth-child(2) li:nth-child(4) a { transition-delay: 0.45s; }

        .dropdown-column:nth-child(3) li:nth-child(1) a { transition-delay: 0.4s; }
        .dropdown-column:nth-child(3) li:nth-child(2) a { transition-delay: 0.45s; }
        .dropdown-column:nth-child(3) li:nth-child(3) a { transition-delay: 0.5s; }
        .dropdown-column:nth-child(3) li:nth-child(4) a { transition-delay: 0.55s; }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 52px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 1;
        }

        .overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        /* 主内容区 */
        .main-content {
            padding-top: 52px;
        }

        /* Hero Section */
        .hero-section {
            height: calc(100vh - 52px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Hero 后面的空白区域，用于延长渐变滚动距离 */
        .hero-spacer {
            height: 100vh;
        }

        .hero-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            will-change: opacity;
            transition: opacity 0.2s linear;
        }

        .hero-title {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .hero-title .mtn {
            color: #4C93FB;
        }

        .hero-title .server {
            color: #fff;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            max-width: 600px;
            font-weight: 300;
        }

        /* 滚动指示器 */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            animation: bounce 2s infinite;
        }

        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            fill: rgba(255, 255, 255, 0.5);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        /* 第二区块 */
        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            position: relative;
            z-index: 3;
            background: #000;
        }

        .section-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .section-title.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-content {
            max-width: 800px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.25rem;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out 0.2s, transform 0.8s ease-out 0.2s;
        }

        .section-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 特性卡片区域 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin-top: 60px;
            padding: 0 20px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.6s ease-out, background 0.3s ease, border-color 0.3s ease;
        }

        .feature-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(76, 147, 251, 0.3);
        }

        .feature-card:nth-child(1) { transition-delay: 0s; }
        .feature-card:nth-child(2) { transition-delay: 0.15s; }
        .feature-card:nth-child(3) { transition-delay: 0.3s; }

        .feature-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: rgba(76, 147, 251, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-icon svg {
            width: 30px;
            height: 30px;
            fill: #4C93FB;
        }

        .feature-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }

        .feature-desc {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 3rem;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>

    <!-- 导航栏 -->
    <div class="nav-wrapper" onmouseleave="hideMenu()">
        <nav class="navbar">
            <a href="index.html" class="logo">
                <span class="mtn">MTN</span><span class="server"> Server</span>
            </a>
            <div class="nav-menu">
                <a class="nav-item active" data-menu="home" onmouseenter="showMenu('home')">主页</a>
                <a class="nav-item" href="join.html" onmouseenter="hideMenu()">加入服务器</a>
                <a class="nav-item" href="wiki.html" onmouseenter="hideMenu()">WIKI</a>
                <a class="nav-item" href="map.html" onmouseenter="hideMenu()">在线地图</a>
                <a class="nav-item" href="feedback.html" onmouseenter="hideMenu()">反馈问题</a>
            </div>
        </nav>

        <!-- 下拉面板 -->
        <div class="dropdown-wrapper" id="dropdownWrapper">
            <div class="dropdown-content" id="dropdownContent">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-content" id="heroContent">
                <h1 class="hero-title">
                    <span class="mtn">MTN</span><span class="server"> Server</span>
                </h1>
                <p class="hero-subtitle">探索无限可能的世界</p>
            </div>
            <div class="scroll-indicator">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                </svg>
            </div>
        </section>

        <!-- Hero 空白区域，延长渐变滚动距离 -->
        <div class="hero-spacer"></div>

        <!-- Section 2 -->
        <section class="section">
            <h2 class="section-title">为什么选择我们</h2>
            <p class="section-content">
                MTN Server 提供极致的游戏体验，稳定的服务器性能，以及活跃的玩家社区。
            </p>
            <div class="features-grid">
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">稳定运行</h3>
                    <p class="feature-desc">0.01% 在线率，专业运维团队保障</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">活跃社区</h3>
                    <p class="feature-desc">数名玩家在线，友好的社区氛围</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">持续更新</h3>
                    <p class="feature-desc">更新得看腐竹啥时候复活（（（</p>
                </div>
            </div>
        </section>

        <!-- Section 3 -->
        <section class="section">
            <h2 class="section-title">立即加入</h2>
            <p class="section-content">
                无论你是新手还是老玩家，MTN Server 都欢迎你的加入。<br>
                开始你的冒险之旅吧。
            </p>
        </section>
    </main>

    <script>
        let currentMenu = null;

        const menuContent = {
            home: {
                columns: [
                    {
                        title: '概览',
                        links: [{ name: '服务器介绍', href: '#intro' }, { name: '游戏特色', href: '#features' }, { name: '最新动态', href: '#news' }, { name: '玩家社区', href: '#community' }]
                    },
                    {
                        title: '快速开始',
                        links: [{ name: '新手指南', href: 'wiki.html#survival' }, { name: '游戏规则', href: 'wiki.html#rules' }, { name: '常见问题', href: 'join.html#faq' }]
                    },
                    {
                        title: '资源下载',
                        links: [{ name: '客户端下载', href: '#' }, { name: '模组包', href: '#' }, { name: '材质包', href: '#' }, { name: '皮肤', href: '#' }]
                    }
                ]
            }
        };

        function showMenu(menuKey) {
            const dropdownWrapper = document.getElementById('dropdownWrapper');
            const dropdownContent = document.getElementById('dropdownContent');
            const overlay = document.getElementById('overlay');
            const navItems = document.querySelectorAll('.nav-item');

            navItems.forEach(item => item.classList.remove('active'));

            currentMenu = menuKey;
            
            const activeItem = document.querySelector(`[data-menu="${menuKey}"]`);
            if (activeItem) activeItem.classList.add('active');

            const menu = menuContent[menuKey];
            dropdownContent.innerHTML = menu.columns.map(col => `
                <div class="dropdown-column">
                    <h3>${col.title}</h3>
                    <ul>
                        ${col.links.map(link => `<li><a href="${link.href}">${link.name}</a></li>`).join('')}
                    </ul>
                </div>
            `).join('');

            dropdownWrapper.classList.add('open');
            overlay.classList.add('visible');
        }

        function hideMenu() {
            const dropdownWrapper = document.getElementById('dropdownWrapper');
            const overlay = document.getElementById('overlay');
            const navItems = document.querySelectorAll('.nav-item');

            dropdownWrapper.classList.remove('open');
            overlay.classList.remove('visible');
            navItems.forEach(item => item.classList.remove('active'));
            currentMenu = null;
        }

        // 点击遮罩关闭菜单
        document.getElementById('overlay').addEventListener('click', hideMenu);

        // 滚动动画
        const heroContent = document.getElementById('heroContent');
        const scrollIndicator = document.querySelector('.scroll-indicator');
        const sectionTitles = document.querySelectorAll('.section-title');
        const sectionContents = document.querySelectorAll('.section-content');
        const featureCards = document.querySelectorAll('.feature-card');

        // 滚动时渐出效果 - 更持久（需要滚动更多才能完全淡出）
        function handleScroll() {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            // Hero 渐出效果 - 需要滚动1.25倍屏幕高度才完全淡出
            const heroProgress = Math.min(scrollY / (windowHeight * 1.25), 1);
            
            if (heroContent) {
                heroContent.style.opacity = 1 - heroProgress;
            }

            if (scrollIndicator) {
                scrollIndicator.style.opacity = Math.max(1 - heroProgress * 1.5, 0);
            }
        }

        // Intersection Observer - 元素进入视口时的动画
        const observerOptions = {
            threshold: 0.2,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        // 观察所有需要动画的元素
        sectionTitles.forEach(el => observer.observe(el));
        sectionContents.forEach(el => observer.observe(el));
        featureCards.forEach(el => observer.observe(el));

        // 监听滚动
        window.addEventListener('scroll', handleScroll, { passive: true });
        
        // 初始化
        handleScroll();
    </script>
</body>
</html>
